<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>회원가입</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div id="mem_title">
    회원가입
</div>

<form>
    <ul id="mem_form">

        <li class="row">
            <ul class="item">
                <li class="col1">*아이디</li>
                <li class="col2">
                    <ul>
                        <li><input type="text"></li>
                        <li>영문, 숫자 조합으로 4~12자 이내</li>
                    </ul>
                </li>
            </ul>
        </li>

        <li class="row">
            <ul class="item">
                <li class="col1">*비밀번호</li>
                <li class="col2">
                    <ul>
                        <li><input type="password"></li>
                        <li>영문, 숫자 조합으로 4~12자 이내</li>
                    </ul>
                </li>
            </ul>
        </li>

        <li class="row">
            <ul class="item">
                <li class="col1">비밀번호 확인</li>
                <li class="col2">
                    <ul>
                        <li><input type="password"></li>
                    </ul>
                </li>
            </ul>
        </li>

        <li class="row">
            <ul class="item">
                <li class="col1">이름</li>
                <li class="col2">
                    <ul>
                        <li><input type="text"></li>
                    </ul>
                </li>
            </ul>
        </li>

        <li class="row">
            <ul class="item">
                <li class="col1">생년월일</li>
                <li class="col2">
                    <ul>
                        <li><input style="width:40px" type="text"></li>
                        <li>년</li>
                        <li><input style="width:20px" type="text"></li>
                        <li>월</li>
                        <li><input style="width:20px" type="text"></li>
                        <li>일</li>
                        <li><input type="radio" name="year" checked></li>
                        <li>음력</li>
                        <li><input type="radio" name="year"></li>
                        <li>양력</li>
                    </ul>
                </li>
            </ul>
        </li>

        <li class="row">
            <ul class="item">
                <li class="col1">이메일</li>
                <li class="col2">
                    <ul>
                        <li><input type="text"></li>
                    </ul>
                </li>
            </ul>
        </li>

        <li class="row">
            <ul class="item">
                <li class="col1">휴대전화</li>
                <li class="col2">
                    <ul>
                        <li><input style="width:30px;" type="text"></li>
                        <li>-</li>
                        <li><input style="width:40px" type="text"></li>
                        <li>-</li>
                        <li><input style="width:40px" type="text"></li>
                    </ul>
                </li>
            </ul>
        </li>

        <li class="row">
            <ul class="item">
                <li class="col1">직업</li>
                <li class="col2">
                    <ul>
                        <li>
                            <select>
                                <option>직업선택</option>
                                <option>직장인</option>
                                <option>사업가</option>
                                <option>학생</option>
                                <option>기타</option>
                            </select>
                        </li>
                    </ul>
                </li>
            </ul>
        </li>

        <li class="row">
            <ul class="item">
                <li class="col1">영어수강 목적</li>
                <li class="col2">
                    <ul>
                        <li><input type="checkbox"></li><li>시험대비</li>
                        <li><input type="checkbox"></li><li>업무상</li>
                        <li><input type="checkbox"></li><li>취미</li>
                        <li><input type="checkbox"></li><li>기타</li>
                    </ul>
                </li>
            </ul>
        </li>

    </ul>

    <div id="buttons">
        <button type="reset" class="btn btn-sm btn-outline-primary">취소</button>
        <button type="submit" class="btn btn-sm btn-outline-primary">확인</button>
    </div>

</form>

</body>
</html>
